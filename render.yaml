services:
  - type: web
    name: branches-api
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed && python manage.py collectstatic --noinput
    startCommand: gunicorn branches_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
